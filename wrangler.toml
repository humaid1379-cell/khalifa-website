# Cloudflare Pages configuration
# D1 database binding for article storage
# The database_id must be set after creating the D1 database in the Cloudflare dashboard

name = "khalifa-website"
compatibility_date = "2024-12-01"

[[d1_databases]]
binding = "DB"
database_name = "khalifa-articles"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"
